<!DOCTYPE html>
<html>
<head>
    <title>LaTeX Character Sheet Preview</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; }
        .page-container {
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }
        img {
            max-width: 800px;
            display: block;
        }
    </style>
</head>
<body>
    <h1>Valerius Character Sheet Preview</h1>
    <div class="page-container">
        <h2>Page 1</h2>
        <img src="character_page-1.png" alt="Page 1">
    </div>
    <div class="page-container">
        <h2>Page 2</h2>
        <img src="character_page-2.png" alt="Page 2">
    </div>
</body>
</html>
